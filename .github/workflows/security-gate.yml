name: Security Gate

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

jobs:
  dependency-policy:
    name: Dependency Policy
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  backend-security-gate:
    name: Backend Audit + SAST
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mayra-impex-backend/package-lock.json

      - name: Install backend dependencies
        working-directory: mayra-impex-backend
        run: npm ci

      - name: Fail on high/critical vulnerabilities
        working-directory: mayra-impex-backend
        run: npm audit --omit=dev --audit-level=high

      - name: Semgrep SAST scan
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/javascript
            p/nodejs
            p/owasp-top-ten

  mobile-security-gate:
    name: Mobile Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mayra-impex-mobile/package-lock.json

      - name: Install mobile dependencies
        working-directory: mayra-impex-mobile
        run: npm ci

      - name: Fail on high/critical vulnerabilities
        working-directory: mayra-impex-mobile
        run: npm audit --omit=dev --audit-level=high

  secret-scanning:
    name: Secret Scanning
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
